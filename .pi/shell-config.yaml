orchestrator:
  model: openrouter/minimax/minimax-m2.5
  max_dispatch_result_tokens: 8000
  compaction_summary: true

fan_out:
  cost_ceiling: 0.50
  max_agents: 5

context_injection:
  enabled: true
  max_matches: 3

agent_models:
  scout: openrouter/anthropic/claude-haiku-4.5
  planner: openrouter/anthropic/claude-haiku-4.5
  builder: openrouter/anthropic/claude-sonnet-4
  reviewer: openrouter/anthropic/claude-sonnet-4
  red-team: openrouter/anthropic/claude-sonnet-4
  answer: openrouter/anthropic/claude-haiku-4.5

agent_timeouts:
  scout: 300
  planner: 300
  builder: 900
  reviewer: 600
  answer: 120

api_keys:
  work:
    env: OPENROUTER_API_KEY
  personal:
    env: OPENROUTER_PERSONAL_KEY
  default: work

interactive_commands:
  - vim
  - nvim
  - nano
  - htop
  - top
  - less
  - more
  - ssh
  - python
  - node
  - irb

git:
  auto_branch: true
  auto_pr: true
  branch_prefix: "task/"
  require_gh: false
